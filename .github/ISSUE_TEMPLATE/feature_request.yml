name: Feature request
description: Suggest an enhancement or new capability for CoreMetrics
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Why does it matter?
      placeholder: I want to monitor GPU temperature but CoreMetrics only shows CPU stats.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.
    validations:
      required: false
