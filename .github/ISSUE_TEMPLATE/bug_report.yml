name: Bug report
description: Report a defect in CoreMetrics
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Run `make`
        2. Launch `./bin/coremetrics`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g. macOS 14.5, Ubuntu 24.04, Windows 11
      placeholder: macOS 14.5
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CoreMetrics version or commit
      description: Git tag, release version, or commit SHA.
      placeholder: v0.3.0 or 7b9059e
    validations:
      required: true
