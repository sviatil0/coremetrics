name: macOS codesign + notarize

# Reusable workflow. Called by .github/workflows/release.yml after the
# macOS release tarball is built. Takes the unsigned bin/coremetrics from
# the matrix artifact, codesigns it with the Developer ID identity, runs
# notarytool, staples the ticket, and re-tars the result as a *-signed
# tarball for upload to the GitHub Release.
#
# The workflow is a no-op when the required secrets are missing (e.g.
# before Apple Developer Program enrollment), so it can ship in the
# repo without breaking the release pipeline.
#
# Secret keys consumed (see docs/SIGNING.md for setup):
#   MACOS_CODESIGN_IDENTITY_P12         base64(.p12)
#   MACOS_CODESIGN_IDENTITY_PASSWORD    the -P password used at export
#   MACOS_CODESIGN_IDENTITY_NAME        the find-identity row label
#   MACOS_NOTARIZATION_APPLE_ID         Apple ID email
#   MACOS_NOTARIZATION_APP_PASSWORD     app-specific password
#   MACOS_NOTARIZATION_TEAM_ID          ABC1234DEF

on:
  workflow_call:
    inputs:
      tarball_name:
        type: string
        required: true
        description: "Filename of the unsigned macOS tarball under dist/"
      tag:
        type: string
        required: true
    secrets:
      codesign_identity_p12:
        required: false
      codesign_identity_password:
        required: false
      codesign_identity_name:
        required: false
      notarization_apple_id:
        required: false
      notarization_app_password:
        required: false
      notarization_team_id:
        required: false

jobs:
  sign:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Skip when signing secrets are absent
        id: gate
        env:
          P12: ${{ secrets.codesign_identity_p12 }}
          APPLE_ID: ${{ secrets.notarization_apple_id }}
        run: |
          if [ -z "$P12" ] || [ -z "$APPLE_ID" ]; then
            echo "Required signing secrets missing; skipping signed-tarball production." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull unsigned macOS tarball artifact
        if: steps.gate.outputs.skip != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coremetrics-macos-arm64
          path: dist

      - name: Import Developer ID certificate
        if: steps.gate.outputs.skip != 'true'
        env:
          P12_B64: ${{ secrets.codesign_identity_p12 }}
          P12_PASS: ${{ secrets.codesign_identity_password }}
        run: |
          # Temporary keychain so the certificate import doesn't pollute
          # the runner's login keychain and is wiped at job teardown.
          KCH=$RUNNER_TEMP/build.keychain
          KCH_PASS=$(uuidgen)
          security create-keychain -p "$KCH_PASS" "$KCH"
          security set-keychain-settings -lut 21600 "$KCH"
          security unlock-keychain -p "$KCH_PASS" "$KCH"
          security list-keychains -s "$KCH" $(security list-keychains -d user | tr -d '"')

          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/dev.p12"
          security import "$RUNNER_TEMP/dev.p12" -k "$KCH" -P "$P12_PASS" \
                          -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KCH_PASS" "$KCH"

      - name: Codesign the binary
        if: steps.gate.outputs.skip != 'true'
        env:
          SIGN_ID: ${{ secrets.codesign_identity_name }}
          TARBALL: ${{ inputs.tarball_name }}
          TAG: ${{ inputs.tag }}
        run: |
          # Unpack the unsigned tarball, sign the binary in place, then
          # re-pack as a *-signed tarball alongside the unsigned one.
          set -euxo pipefail
          cd dist
          tar xzf "$TARBALL"
          DIR="${TARBALL%.tar.gz}"
          codesign --options runtime --timestamp --force \
                   --sign "$SIGN_ID" \
                   "$DIR/coremetrics"
          codesign --verify --deep --strict --verbose=2 "$DIR/coremetrics"
          # Hardened runtime + timestamp are required for notarization.
          ditto -c -k --keepParent "$DIR" "${DIR}-signed.zip"

      - name: Notarize + staple
        if: steps.gate.outputs.skip != 'true'
        env:
          APPLE_ID: ${{ secrets.notarization_apple_id }}
          APP_PASS: ${{ secrets.notarization_app_password }}
          TEAM_ID: ${{ secrets.notarization_team_id }}
          TARBALL: ${{ inputs.tarball_name }}
        run: |
          set -euxo pipefail
          cd dist
          DIR="${TARBALL%.tar.gz}"
          xcrun notarytool submit "${DIR}-signed.zip" \
                --apple-id "$APPLE_ID" \
                --password "$APP_PASS" \
                --team-id "$TEAM_ID" \
                --wait
          xcrun stapler staple "$DIR/coremetrics"
          # Final tarball that ships to the GitHub Release.
          tar -C dist -czf "${DIR}-signed.tar.gz" "$DIR"

      - name: Upload signed tarball
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coremetrics-macos-arm64-signed
          path: dist/coremetrics-*-signed.tar.gz
          if-no-files-found: error
