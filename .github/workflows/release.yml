name: Release

# Fires on any tag matching `v*` (e.g. `v0.1.0`). Builds the production
# binary on Linux and macOS, packages it with required runtime assets,
# also produces a Debian .deb, and attaches everything to a GitHub Release
# for the same tag. Users on either platform can `curl` the asset and run
# the binary without a local toolchain.
#
# Triggered manually with `git tag v0.1.0 && git push origin v0.1.0`.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Extract tag (Unix)
        id: tag
        if: runner.os != 'Windows'
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract tag (Windows)
        id: tag_win
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace '^refs/tags/',''
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libfreetype-dev libharfbuzz-dev ruby ruby-dev rpm
          sudo gem install --no-document fpm

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install sdl3 sdl3_ttf sdl3_image

      - name: Setup SDL3 (Linux)
        if: runner.os == 'Linux'
        uses: libsdl-org/setup-sdl@a966470e7d9b6a5c93eec3f08d5dac370325c860  # main@2026-05-15
        with:
          install-linux-dependencies: true
          version: 3-latest
          version-sdl-ttf: 3-latest
          version-sdl-image: 3-latest

      - name: Setup SDL3 (Windows)
        if: runner.os == 'Windows'
        uses: libsdl-org/setup-sdl@a966470e7d9b6a5c93eec3f08d5dac370325c860  # main@2026-05-15
        with:
          version: 3-latest
          version-sdl-ttf: 3-latest
          version-sdl-image: 3-latest

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p obj bin
          LIB_PATHS=$(pkg-config --libs-only-L sdl3 sdl3-ttf sdl3-image | sed 's|-L||g')
          RPATHS=""
          for P in $LIB_PATHS; do RPATHS="$RPATHS -Wl,-rpath,$P"; done
          make bin/coremetrics CXXFLAGS="-std=c++23 -Wall -O2 -I ./include $(pkg-config --cflags sdl3 sdl3-ttf sdl3-image)" \
                               LDFLAGS="$(pkg-config --libs sdl3 sdl3-ttf sdl3-image) $RPATHS"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p obj bin
          make bin/coremetrics CXXFLAGS="-std=c++23 -Wall -O2 -I ./include -I/opt/homebrew/include"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # MSYS2 / MinGW-w64 build: the GNU Makefile already drives the C++23
        # compile, we just point it at the SDL3 dev tree the setup-sdl action
        # installed and produce coremetrics.exe alongside the bundled DLLs.
        run: |
          choco install -y mingw make pkgconfiglite
          mkdir -p obj bin
          $env:Path = "C:\ProgramData\chocolatey\bin;$env:Path"
          $sdlPrefix = "${env:RUNNER_TEMP}\sdl-prefix"
          if (-not (Test-Path $sdlPrefix)) { $sdlPrefix = "$PWD\sdl-prefix" }
          make bin/coremetrics CXX=g++ `
            CXXFLAGS="-std=c++23 -Wall -O2 -I ./include -I${sdlPrefix}/include" `
            LDFLAGS="-L${sdlPrefix}/lib -lSDL3 -lSDL3_ttf -lSDL3_image"
          Get-ChildItem bin

      - name: Detect platform suffix (Unix)
        id: plat
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            echo "suffix=linux-x86_64" >> "$GITHUB_OUTPUT"
          else
            ARCH=$(uname -m)
            if [ "$ARCH" = "arm64" ]; then ARCH="arm64"; else ARCH="x86_64"; fi
            echo "suffix=macos-$ARCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect platform suffix (Windows)
        id: plat_win
        if: runner.os == 'Windows'
        shell: pwsh
        run: 'echo "suffix=windows-x86_64" | Out-File -FilePath $env:GITHUB_OUTPUT -Append'

      - name: Package tarball (Unix)
        if: runner.os != 'Windows'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SUFFIX: ${{ steps.plat.outputs.suffix }}
        run: |
          PKG="coremetrics-${TAG}-${SUFFIX}"
          mkdir -p "dist/$PKG"
          cp bin/coremetrics "dist/$PKG/coremetrics"
          cp -r assets "dist/$PKG/assets"
          cp README.md LICENSE CONTRIBUTING.md base.xml "dist/$PKG/" 2>/dev/null || true
          # If LICENSE does not exist at repo root, fall back to the font license note.
          if [ ! -f "dist/$PKG/LICENSE" ]; then cp assets/font.LICENSE.txt "dist/$PKG/LICENSE-notes.txt"; fi
          cat > "dist/$PKG/INSTALL.txt" <<EOF
          coremetrics ${TAG} (${SUFFIX})

          1. Install SDL3 runtime dependencies for your platform:
             macOS:        brew install sdl3 sdl3_ttf sdl3_image
             Debian/Ubuntu: sudo apt-get install libsdl3-0 libsdl3-ttf-0 libsdl3-image-0
                            (or build from libsdl-org/SDL if your distro is older)
          2. From inside this directory, run:
                ./coremetrics
          EOF
          tar -C dist -czf "dist/${PKG}.tar.gz" "$PKG"
          ls -la "dist/${PKG}.tar.gz"

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ steps.tag_win.outputs.tag }}
          SUFFIX: ${{ steps.plat_win.outputs.suffix }}
        run: |
          $pkg = "coremetrics-$env:TAG-$env:SUFFIX"
          New-Item -ItemType Directory -Force -Path "dist\$pkg" | Out-Null
          Copy-Item bin\coremetrics.exe "dist\$pkg\coremetrics.exe"
          Copy-Item -Recurse assets "dist\$pkg\assets"
          Copy-Item base.xml "dist\$pkg\"
          if (Test-Path README.md) { Copy-Item README.md "dist\$pkg\" }
          if (Test-Path LICENSE) { Copy-Item LICENSE "dist\$pkg\" }
          if (Test-Path CONTRIBUTING.md) { Copy-Item CONTRIBUTING.md "dist\$pkg\" }
          # Bundle SDL3 runtime DLLs alongside the .exe so the zip is self-contained.
          $sdlPrefix = "${env:RUNNER_TEMP}\sdl-prefix"
          if (-not (Test-Path $sdlPrefix)) { $sdlPrefix = "$PWD\sdl-prefix" }
          Get-ChildItem "$sdlPrefix\bin\*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination "dist\$pkg\"
          @"
          coremetrics $env:TAG ($env:SUFFIX)

          1. Unzip this archive anywhere.
          2. Double-click coremetrics.exe or run it from a terminal.

          SDL3.dll, SDL3_ttf.dll, and SDL3_image.dll ship next to the binary.
          "@ | Out-File -FilePath "dist\$pkg\INSTALL.txt" -Encoding ascii
          Compress-Archive -Path "dist\$pkg" -DestinationPath "dist\$pkg.zip" -Force
          Get-ChildItem "dist\$pkg.zip"

      - name: Build .deb (Linux only)
        if: runner.os == 'Linux'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Strip leading 'v' from tag for Debian version field.
          VERSION="${TAG#v}"
          PKG_ROOT="dist/deb-root"
          mkdir -p "$PKG_ROOT/DEBIAN" "$PKG_ROOT/usr/bin" "$PKG_ROOT/usr/share/coremetrics/assets" "$PKG_ROOT/usr/share/doc/coremetrics"
          cp bin/coremetrics "$PKG_ROOT/usr/bin/coremetrics"
          cp -r assets/* "$PKG_ROOT/usr/share/coremetrics/assets/"
          cp base.xml "$PKG_ROOT/usr/share/coremetrics/"
          cp README.md CONTRIBUTING.md "$PKG_ROOT/usr/share/doc/coremetrics/" 2>/dev/null || true
          cat > "$PKG_ROOT/DEBIAN/control" <<EOF
          Package: coremetrics
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libsdl3-0 | libsdl3, libsdl3-ttf-0 | libsdl3-ttf, libsdl3-image-0 | libsdl3-image
          Maintainer: Sviatoslav Oleksiienko <soleksiienko1@gmail.com>
          Description: Cross-platform desktop system metrics monitor
           CoreMetrics is a small SDL3 GUI that shows live CPU, RAM, GPU,
           and per-process resource usage. The metrics backends are
           per-platform (Linux /proc, macOS Mach + libproc, Windows PDH).
          EOF
          dpkg-deb --build "$PKG_ROOT" "dist/coremetrics_${VERSION}_amd64.deb"
          ls -la dist/coremetrics_*.deb

      - name: Build .rpm (Linux only, via fpm)
        if: runner.os == 'Linux'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # fpm consumes the same staged tree we built for the .deb. We do
          # not consume packaging/rpm/coremetrics.spec here; that spec is
          # for distro builds from source (Fedora COPR / openSUSE OBS).
          VERSION="${TAG#v}"
          STAGE="dist/rpm-stage"
          mkdir -p "$STAGE/usr/bin" "$STAGE/usr/share/coremetrics/assets" "$STAGE/usr/share/doc/coremetrics"
          cp bin/coremetrics "$STAGE/usr/bin/coremetrics"
          cp -r assets/* "$STAGE/usr/share/coremetrics/assets/"
          cp base.xml "$STAGE/usr/share/coremetrics/"
          cp README.md CONTRIBUTING.md "$STAGE/usr/share/doc/coremetrics/" 2>/dev/null || true
          fpm -s dir -t rpm \
            --name coremetrics \
            --version "${VERSION}" \
            --iteration 1 \
            --architecture x86_64 \
            --license LGPL-2.1-only \
            --maintainer "Sviatoslav Oleksiienko <soleksiienko1@gmail.com>" \
            --url https://github.com/sviatil0/coremetrics \
            --description "Cross-platform desktop system metrics monitor (CPU / RAM / GPU / processes)" \
            --depends SDL3 --depends SDL3_ttf --depends SDL3_image \
            --package "dist/coremetrics-${VERSION}-1.x86_64.rpm" \
            -C "$STAGE" .
          ls -la dist/coremetrics-*.rpm

      - name: Upload artifacts (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coremetrics-${{ steps.plat.outputs.suffix }}
          path: |
            dist/coremetrics-*.tar.gz
            dist/coremetrics_*.deb
            dist/coremetrics-*.rpm
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coremetrics-${{ steps.plat_win.outputs.suffix }}
          path: |
            dist/coremetrics-*.zip
          if-no-files-found: warn

  codesign-macos:
    # Optional Developer ID codesign + notarize pass for the macOS arm64
    # tarball. The called workflow is a no-op when the secrets are absent,
    # so this job stays green before Apple Developer Program enrollment.
    # Once the secrets are in place, every v* tag produces a second
    # *-signed tarball alongside the unsigned one.
    needs: build
    uses: ./.github/workflows/macos-codesign.yml
    with:
      tarball_name: coremetrics-${{ needs.build.outputs.tag || github.ref_name }}-macos-arm64.tar.gz
      tag: ${{ needs.build.outputs.tag || github.ref_name }}
    secrets:
      codesign_identity_p12: ${{ secrets.MACOS_CODESIGN_IDENTITY_P12 }}
      codesign_identity_password: ${{ secrets.MACOS_CODESIGN_IDENTITY_PASSWORD }}
      codesign_identity_name: ${{ secrets.MACOS_CODESIGN_IDENTITY_NAME }}
      notarization_apple_id: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
      notarization_app_password: ${{ secrets.MACOS_NOTARIZATION_APP_PASSWORD }}
      notarization_team_id: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}

  release:
    needs: [build, codesign-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist

      - name: Flatten artifact tree
        run: |
          mkdir -p release-assets
          # Pull every tarball (signed + unsigned) and every .deb the matrix
          # produced. The signed tarball is optional and only present when
          # the Developer ID secrets are configured; -true keeps find quiet
          # when nothing matches.
          find dist -type f \( -name 'coremetrics-*.tar.gz' -o -name 'coremetrics_*.deb' -o -name 'coremetrics-*.rpm' -o -name 'coremetrics-*.zip' \) -print -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/*
