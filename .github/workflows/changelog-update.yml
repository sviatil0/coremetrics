name: Update CHANGELOG
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4.8.0
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
      - name: Commit on main
        env:
          GIT_AUTHOR_NAME: Sviatoslav Oleksiienko
          GIT_AUTHOR_EMAIL: soleksiienko1@gmail.com
          GIT_COMMITTER_NAME: Sviatoslav Oleksiienko
          GIT_COMMITTER_EMAIL: soleksiienko1@gmail.com
        run: |
          git checkout main
          git pull origin main
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes."
            exit 0
          fi
          git commit -m "docs: regenerate CHANGELOG from git-cliff after $GITHUB_REF_NAME"
          for i in 1 2 3 4 5; do
            if git push origin main; then
              exit 0
            fi
            git fetch origin main
            git rebase origin/main
          done
          exit 1
