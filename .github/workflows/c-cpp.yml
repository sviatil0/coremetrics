name: C/C++ CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # All three legs are gated now that the Windows SDL3 + MinGW
        # toolchain is stable. The Windows step uses SDL3_ROOT / static
        # libstdc++ / DLL copy to keep tests.exe self-contained.
        include:
          - os: ubuntu-latest
            allow-failure: false
          - os: macos-latest
            allow-failure: false
          - os: windows-latest
            allow-failure: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow-failure }}

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libfreetype-dev libharfbuzz-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install sdl3 sdl3_ttf sdl3_image

    - name: Setup SDL3 (Linux)
      if: runner.os == 'Linux'
      uses: libsdl-org/setup-sdl@main
      with:
        install-linux-dependencies: true
        version: 3-latest
        version-sdl-ttf: 3-latest
        version-sdl-image: 3-latest

    - name: Setup SDL3 (Windows)
      if: runner.os == 'Windows'
      uses: libsdl-org/setup-sdl@main
      with:
        version: 3-latest
        version-sdl-ttf: 3-latest
        version-sdl-image: 3-latest

    - name: Build tests (Linux)
      if: runner.os == 'Linux'
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        LIB_PATHS=$(pkg-config --libs-only-L sdl3 sdl3-ttf sdl3-image | sed 's|-L||g')
        for P in $LIB_PATHS; do export LD_LIBRARY_PATH="$P:$LD_LIBRARY_PATH"; done
        RPATHS=""
        for P in $LIB_PATHS; do RPATHS="$RPATHS -Wl,-rpath,$P"; done
        make CXXFLAGS="-std=c++23 -Wall -I ./include $(pkg-config --cflags sdl3 sdl3-ttf sdl3-image)" \
             LDFLAGS="$(pkg-config --libs sdl3 sdl3-ttf sdl3-image) $RPATHS" test

    - name: Headless screenshots (Linux)
      if: runner.os == 'Linux'
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        LIB_PATHS=$(pkg-config --libs-only-L sdl3 sdl3-ttf sdl3-image | sed 's|-L||g')
        for P in $LIB_PATHS; do export LD_LIBRARY_PATH="$P:$LD_LIBRARY_PATH"; done
        RPATHS=""
        for P in $LIB_PATHS; do RPATHS="$RPATHS -Wl,-rpath,$P"; done
        make CXXFLAGS="-std=c++23 -Wall -I ./include $(pkg-config --cflags sdl3 sdl3-ttf sdl3-image)" \
             LDFLAGS="$(pkg-config --libs sdl3 sdl3-ttf sdl3-image) $RPATHS" bin/coremetrics
        mkdir -p smoke
        ./bin/coremetrics --duration 2 --screenshot smoke/linux-system.png
        ./bin/coremetrics --duration 2 --screenshot smoke/linux-processes.png processes
        for f in smoke/*.png; do
          [ -s "$f" ] || { echo "::error::$f is empty or missing"; exit 1; }
          echo "$f $(stat -c%s "$f") bytes"
        done

    - name: Build tests (macOS)
      if: runner.os == 'macOS'
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        make test

    - name: Headless screenshots (macOS)
      if: runner.os == 'macOS'
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        make bin/coremetrics
        mkdir -p smoke
        ./bin/coremetrics --duration 2 --screenshot smoke/macos-system.png
        ./bin/coremetrics --duration 2 --screenshot smoke/macos-processes.png processes
        for f in smoke/*.png; do
          [ -s "$f" ] || { echo "::error::$f is empty or missing"; exit 1; }
          echo "$f $(stat -f%z "$f") bytes"
        done

    - name: Build tests (Windows)
      if: runner.os == 'Windows'
      shell: bash
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        # Bypass pkg-config on Windows: the setup-sdl action sets
        # SDL3_ROOT / SDL3_ttf_ROOT / SDL3_image_ROOT, and using those
        # directly avoids the Windows-vs-MSYS path translation that left
        # the prior pkg-config based CXXFLAGS empty (so g++ never saw
        # the SDL3 include directory and the build failed at
        # screen.hpp's #include <SDL3/SDL.h>).
        SDL_CFLAGS="-I${SDL3_ROOT}/include -I${SDL3_ttf_ROOT}/include -I${SDL3_image_ROOT}/include"
        # SystemMetrics_win.cpp links against PDH (GPU counters) and
        # PSAPI (GetProcessMemoryInfo). These ship in the Windows SDK so
        # no extra -L is needed; naming the libs by short name is enough.
        # Static C++ runtime so bin/tests.exe does not depend on
        # libstdc++-6.dll / libgcc_s_seh-1.dll / libwinpthread-1.dll
        # from the MinGW install (which aren't on the runner's PATH
        # and were silently causing tests.exe to exit 127).
        SDL_LIBS="-L${SDL3_ROOT}/lib -L${SDL3_ttf_ROOT}/lib -L${SDL3_image_ROOT}/lib -lSDL3 -lSDL3_ttf -lSDL3_image -lpdh -lpsapi -liphlpapi -static-libgcc -static-libstdc++"
        echo "Resolved SDL_CFLAGS: $SDL_CFLAGS"
        # Build first (without running tests), then copy the SDL3 DLLs
        # next to bin/tests so the Windows dynamic loader can find them
        # (-L only helps the linker; runtime uses PATH and the exe
        # directory). The setup-sdl layout has dlls in bin/ in some
        # versions and lib/ in others; search both.
        mkdir -p obj bin
        make CXX=g++ \
             CXXFLAGS="-std=c++23 -Wall -I ./include $SDL_CFLAGS" \
             LDFLAGS="$SDL_LIBS" \
             bin/tests
        for dir in "${SDL3_ROOT}" "${SDL3_ttf_ROOT}" "${SDL3_image_ROOT}"; do
          for sub in bin lib; do
            for dll in "$dir/$sub"/SDL3*.dll; do
              [ -f "$dll" ] && cp -v "$dll" bin/ || true
            done
          done
        done
        ls -la bin/
        # Windows binaries have a .exe suffix; bin/tests on disk is
        # actually bin/tests.exe.
        if [ -f bin/tests.exe ]; then
          ./bin/tests.exe
        else
          ./bin/tests
        fi

    - name: Headless screenshots (Windows)
      if: runner.os == 'Windows'
      shell: bash
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        # Same SDL3_ROOT bypass + static C++ runtime + lib list used by
        # the tests build. The coremetrics target compiles coremetrics.cpp
        # + every src/*.cpp; the link inputs are identical to bin/tests.
        SDL_CFLAGS="-I${SDL3_ROOT}/include -I${SDL3_ttf_ROOT}/include -I${SDL3_image_ROOT}/include"
        SDL_LIBS="-L${SDL3_ROOT}/lib -L${SDL3_ttf_ROOT}/lib -L${SDL3_image_ROOT}/lib -lSDL3 -lSDL3_ttf -lSDL3_image -lpdh -lpsapi -liphlpapi -static-libgcc -static-libstdc++"
        make CXX=g++ \
             CXXFLAGS="-std=c++23 -Wall -I ./include $SDL_CFLAGS" \
             LDFLAGS="$SDL_LIBS" \
             bin/coremetrics
        # DLLs were already copied to bin/ during the tests build step.
        mkdir -p smoke
        # The Windows exe is bin/coremetrics.exe even though the Make
        # target is bin/coremetrics; the .exe extension is implicit.
        EXE=./bin/coremetrics.exe
        [ -f "$EXE" ] || EXE=./bin/coremetrics
        "$EXE" --duration 2 --screenshot smoke/windows-system.png
        "$EXE" --duration 2 --screenshot smoke/windows-processes.png processes
        for f in smoke/*.png; do
          [ -s "$f" ] || { echo "::error::$f is empty or missing"; exit 1; }
          echo "$f $(stat -c%s "$f") bytes"
        done

    - name: CLI --top smoke (Linux)
      if: runner.os == 'Linux'
      env:
        SDL_VIDEO_DRIVER: dummy
      run: sh scripts/test-cli-top.sh bin/coremetrics

    - name: CLI --top smoke (macOS)
      if: runner.os == 'macOS'
      env:
        SDL_VIDEO_DRIVER: dummy
      run: sh scripts/test-cli-top.sh bin/coremetrics

    - name: CLI --top smoke (Windows)
      if: runner.os == 'Windows'
      shell: bash
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        EXE=bin/coremetrics.exe
        [ -f "$EXE" ] || EXE=bin/coremetrics
        sh scripts/test-cli-top.sh "$EXE"

    - name: Upload smoke screenshots
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: smoke-screenshots-${{ matrix.os }}
        path: smoke/*.png
        if-no-files-found: warn
        retention-days: 14

  sanitizers:
    # Re-run the test suite under AddressSanitizer and UndefinedBehaviorSanitizer
    # on Linux. Non-blocking for now (continue-on-error: true) so a sanitizer
    # report doesn't gate a merge while the targets bed in; flip to required
    # once the suite has stayed clean for a release cycle.
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libfreetype-dev libharfbuzz-dev

    - name: Setup SDL3
      uses: libsdl-org/setup-sdl@main
      with:
        install-linux-dependencies: true
        version: 3-latest
        version-sdl-ttf: 3-latest
        version-sdl-image: 3-latest

    - name: ASan tests
      env:
        SDL_VIDEO_DRIVER: dummy
        ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
      run: |
        LIB_PATHS=$(pkg-config --libs-only-L sdl3 sdl3-ttf sdl3-image | sed 's|-L||g')
        for P in $LIB_PATHS; do export LD_LIBRARY_PATH="$P:$LD_LIBRARY_PATH"; done
        RPATHS=""
        for P in $LIB_PATHS; do RPATHS="$RPATHS -Wl,-rpath,$P"; done
        make asan CXXFLAGS="-std=c++23 -Wall -I ./include $(pkg-config --cflags sdl3 sdl3-ttf sdl3-image)" \
                  LDFLAGS="$(pkg-config --libs sdl3 sdl3-ttf sdl3-image) $RPATHS"

    - name: UBSan tests
      env:
        SDL_VIDEO_DRIVER: dummy
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
      run: |
        LIB_PATHS=$(pkg-config --libs-only-L sdl3 sdl3-ttf sdl3-image | sed 's|-L||g')
        for P in $LIB_PATHS; do export LD_LIBRARY_PATH="$P:$LD_LIBRARY_PATH"; done
        RPATHS=""
        for P in $LIB_PATHS; do RPATHS="$RPATHS -Wl,-rpath,$P"; done
        make ubsan CXXFLAGS="-std=c++23 -Wall -I ./include $(pkg-config --cflags sdl3 sdl3-ttf sdl3-image)" \
                   LDFLAGS="$(pkg-config --libs sdl3 sdl3-ttf sdl3-image) $RPATHS"

  coverage:
    # Build bin/tests with --coverage -O0 -g, run it, capture an lcov report,
    # then upload to codecov.io. Codecov tokenless upload works for public
    # repos so no secret is required. Runs in parallel with `sanitizers`,
    # both gated on `build` so the matrix's Ubuntu leg has already smoked.
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov build-essential pkg-config libfreetype-dev libharfbuzz-dev

    - name: Setup SDL3
      uses: libsdl-org/setup-sdl@main
      with:
        install-linux-dependencies: true
        version: 3-latest
        version-sdl-ttf: 3-latest
        version-sdl-image: 3-latest

    - name: Run coverage
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        LIB_PATHS=$(pkg-config --libs-only-L sdl3 sdl3-ttf sdl3-image | sed 's|-L||g')
        for P in $LIB_PATHS; do export LD_LIBRARY_PATH="$P:$LD_LIBRARY_PATH"; done
        RPATHS=""
        for P in $LIB_PATHS; do RPATHS="$RPATHS -Wl,-rpath,$P"; done
        make coverage CXXFLAGS="-std=c++23 -Wall -I ./include $(pkg-config --cflags sdl3 sdl3-ttf sdl3-image)" \
                      LDFLAGS="$(pkg-config --libs sdl3 sdl3-ttf sdl3-image) $RPATHS"

    - name: Upload to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: coverage.lcov
        fail_ci_if_error: false
