name: C/C++ CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libfreetype-dev libharfbuzz-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install sdl3 sdl3_ttf sdl3_image

    - name: Setup SDL3 (Linux)
      if: runner.os == 'Linux'
      uses: libsdl-org/setup-sdl@main
      with:
        install-linux-dependencies: true
        version: 3-latest
        version-sdl-ttf: 3-latest
        version-sdl-image: 3-latest

    - name: Setup SDL3 (Windows)
      if: runner.os == 'Windows'
      uses: libsdl-org/setup-sdl@main
      with:
        version: 3-latest
        version-sdl-ttf: 3-latest
        version-sdl-image: 3-latest

    - name: Build tests (Linux)
      if: runner.os == 'Linux'
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        LIB_PATHS=$(pkg-config --libs-only-L sdl3 sdl3-ttf sdl3-image | sed 's|-L||g')
        for P in $LIB_PATHS; do export LD_LIBRARY_PATH="$P:$LD_LIBRARY_PATH"; done
        RPATHS=""
        for P in $LIB_PATHS; do RPATHS="$RPATHS -Wl,-rpath,$P"; done
        make CXXFLAGS="-std=c++23 -Wall -I ./include $(pkg-config --cflags sdl3 sdl3-ttf sdl3-image)" \
             LDFLAGS="$(pkg-config --libs sdl3 sdl3-ttf sdl3-image) $RPATHS" test

    - name: Build tests (macOS)
      if: runner.os == 'macOS'
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        make test

    - name: Build tests (Windows)
      if: runner.os == 'Windows'
      shell: bash
      env:
        SDL_VIDEO_DRIVER: dummy
      run: |
        INCLUDES="-I ./include -I${SDL3_ROOT}/include -I${SDL3_TTF_ROOT}/include -I${SDL3_IMAGE_ROOT}/include"
        LIBS="-L${SDL3_ROOT}/lib -L${SDL3_TTF_ROOT}/lib -L${SDL3_IMAGE_ROOT}/lib -lSDL3 -lSDL3_ttf -lSDL3_image"
        export PATH="${SDL3_ROOT}/bin:${SDL3_TTF_ROOT}/bin:${SDL3_IMAGE_ROOT}/bin:$PATH"
        make CXX=g++ \
             CXXFLAGS="-std=c++23 -Wall $INCLUDES" \
             LDFLAGS="$LIBS" \
             test
