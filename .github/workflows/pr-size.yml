name: PR size advisory
# Hardened per security audit (H3, 2026-06-18): switched from
# pull_request_target to pull_request so the GITHUB_TOKEN is automatically
# downgraded for fork PRs and untrusted PR head code never executes with
# write-scoped credentials. Same-repo PRs still post the advisory comment;
# fork PRs surface the size only in the workflow log (the lowered token
# cannot comment on the PR from a fork context, which is the correct
# trade-off).
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  pull-requests: write
  contents: read
jobs:
  size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Compute size
        id: size
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          ADDED=$(git diff --stat "$BASE_SHA" "$HEAD_SHA" -- . ':!CHANGELOG.md' ':!assets/**' ':!.github/badges/**' | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          DELETED=$(git diff --stat "$BASE_SHA" "$HEAD_SHA" -- . ':!CHANGELOG.md' ':!assets/**' ':!.github/badges/**' | tail -1 | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          TOTAL=$((ADDED + DELETED))
          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "deleted=$DELETED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "PR size (excluding CHANGELOG, assets, badges): +$ADDED / -$DELETED = $TOTAL lines"
      - name: Comment if over threshold
        if: ${{ steps.size.outputs.total > 500 }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TOTAL: ${{ steps.size.outputs.total }}
        run: |
          gh pr comment "$PR_NUMBER" --body "Advisory: this PR is $TOTAL lines changed (excluding CHANGELOG, assets, badges). PRs over 500 lines are harder to review carefully. Consider splitting into focused commits or follow-up PRs. Non-blocking."
