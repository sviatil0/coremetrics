name: Contribution badge

# Recomputes Stefan's git-blame line share whenever main moves and commits
# the updated `.github/badges/contribution.json` back. The README's badge
# points at the raw URL of that JSON via shields.io's endpoint mode, so the
# percentage always reflects the current main, never a stale hand-typed
# claim.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'bench/**'
      - 'coremetrics.cpp'
      - 'scripts/compute-contributions.sh'
      - '.github/workflows/contribution-badge.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recompute:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for accurate `git blame`

      - name: Recompute badge
        run: bash scripts/compute-contributions.sh

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: Sviatoslav Oleksiienko
          GIT_AUTHOR_EMAIL: soleksiienko1@gmail.com
          GIT_COMMITTER_NAME: Sviatoslav Oleksiienko
          GIT_COMMITTER_EMAIL: soleksiienko1@gmail.com
        run: |
          if git diff --quiet -- .github/badges/contribution.json; then
            echo "Badge unchanged, nothing to commit."
            exit 0
          fi
          git add .github/badges/contribution.json
          git commit -m "chore(badge): refresh contribution share from git blame"
          git push origin HEAD:main
